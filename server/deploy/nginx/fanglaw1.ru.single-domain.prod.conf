# Production-oriented single-domain HTTP template.
# Keeps HTML revalidating on each load, but allows the browser to cache
# heavy Godot web-export files and revalidate them instead of redownloading.
server {
    listen 80;
    listen [::]:80;
    server_name fanglaw1.ru www.fanglaw1.ru;

    root /var/www/fanglaw-web/current;
    index catlaw.html;
    etag on;

    add_header Cross-Origin-Opener-Policy same-origin always;
    add_header Cross-Origin-Embedder-Policy require-corp always;
    add_header Cross-Origin-Resource-Policy same-origin always;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/wasm
        application/octet-stream;

    location = /api-health {
        proxy_pass http://127.0.0.1:2567/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /matchmake/ {
        proxy_pass http://127.0.0.1:2567;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Colyseus websocket path looks like /<processId>/<roomId>?sessionId=...
    location ~ ^/[A-Za-z0-9_-]+/[A-Za-z0-9_-]+$ {
        proxy_pass http://127.0.0.1:2567;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # HTML should always revalidate so a new deploy is picked up immediately.
    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate" always;
        expires -1;
        try_files $uri =404;
    }

    # Large Godot assets are cached locally, but revalidated before reuse.
    # This makes repeat loads much faster without risking long-lived stale files.
    location ~* \.(js|wasm|pck)$ {
        add_header Cache-Control "public, max-age=0, must-revalidate" always;
        try_files $uri =404;
    }

    # Small static assets can stay cached longer.
    location ~* \.(png|ico|svg|webmanifest)$ {
        add_header Cache-Control "public, max-age=86400" always;
        expires 1d;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /catlaw.html;
    }
}
